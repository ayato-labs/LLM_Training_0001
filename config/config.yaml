model:
  params:
    attention_dropout: 0.1
    hidden_act: silu
    hidden_dropout_prob: 0.1
    hidden_size: 512
    intermediate_size: 1024
    max_position_embeddings: 512
    num_attention_heads: 8
    num_hidden_layers: 8
    num_key_value_heads: 2
    vocab_size: 32000
  type: llama
paths:
  dataset_path: data/dataset
  output_dir: models/novel-llm-llama
  tokenizer_path: data/tokenizer.json
scaling_optimization:
  min_data_to_param_ratio: 20
  search_scale_factor: 0.001
  target_model_params: 5000000
tokenizer:
  bos_token: '[CLS]'
  eos_token: '[SEP]'
  pad_token: '[PAD]'
training:
  fp16: true
  gradient_accumulation_steps: 16
  gradient_checkpointing: true
  learning_rate: 0.263441
  logging_steps: 10
  num_train_epochs: 1
  optim: adamw_torch
  per_device_train_batch_size: 1
  report_to: tensorboard
  save_steps: 500
  save_total_limit: 3
