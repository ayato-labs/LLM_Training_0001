# Novel LLM Pretraining Configuration
# Hydra + OmegaConf managed - ADR-014/015/016
# Usage: python main.py --config-name=config

# ============================================================
# 1. Hardware & Environment Constraints
# ============================================================
hardware:
  vram_limit_gb: ${oc.env:VRAM_LIMIT_GB,32.0}
  precision_bytes: 2  # 16-bit (fp16/bf16) = 2

# ============================================================
# 2. Data
# ============================================================
data:
  db_path: "../Novel_Data_Collection/novels.db"
  corpus_path: "data/corpus.jsonl"
  dataset_path: "data/dataset.jsonl"
  tokenizer_path: "data/tokenizer.json"

  preprocessing:
    chunk_size: 2000     # ~1024 tokens
    overlap: 200         # 文脈断絶の最小化

# ============================================================
# 3. Model Architecture
# ============================================================
model:
  arch: "llama"          # llama | modern_gpt
  target_params: 150000000
  proxy_min_params: 30000000

  # Llama config (used when arch=llama)
  llama:
    hidden_size: null     # auto-calculated
    num_hidden_layers: null
    num_attention_heads: null
    intermediate_size: null

# ============================================================
# 4. Tokenizer
# ============================================================
tokenizer:
  vocab_size: 32000
  special_tokens:
    - "[UNK]"
    - "[CLS]"
    - "[SEP]"
    - "[PAD]"
    - "[MASK]"
    - "<|start_of_metadata|>"
    - "<|end_of_metadata|>"
    - "<|start_of_story|>"

# ============================================================
# 5. Training / HPO
# ============================================================
training:
  seq_len: 512
  max_steps: -1          # -1 = epoch-based
  num_epochs: 3
  target_tokens: 30000000
  chinchilla_ratio: 100

  # Step Law defaults (arXiv:2503.04715)
  hpo:
    min_lr: 1e-5
    warmup_ratio: 0.03
    stable_lr_ratio: 0.55

  # Muon / AdamW split
  optimizer:
    muon_lr_ratio: 1.0     # muon_lr = max_lr * ratio
    adamw_lr_ratio: 0.298  # adamw_lr = max_lr * ratio (IMU-1)
    adamw_betas: [0.9, 0.95]
    weight_decay: 0.01

# ============================================================
# 6. Reproducibility (ADR-017)
# ============================================================
seed: 42

# ============================================================
# 7. MLflow Tracking
# ============================================================
mlflow:
  tracking_uri: "file:./mlruns"
  experiment_name: "LLM_Training"

# ============================================================
# 8. Checkpoint Management
# ============================================================
checkpoint:
  save_strategy: "steps"
  save_steps: 1000
  save_total_limit: null  # null = keep all

# ============================================================
# 9. Logging
# ============================================================
logging:
  report_to: ["tensorboard", "mlflow"]
  logging_steps: 10
