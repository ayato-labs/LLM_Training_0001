# @package _global_
# ベース設定（変更頻度低）
defaults:
  - hparams_150M  # モデルサイズ固有の最適HP（自動生成される）

# 共通固定値
seed: 42
precision: "bf16"
output_dir: "models/output"
resume_from_checkpoint: null
deterministic: false


# データ
data_path: "data/dataset.jsonl"
val_data_path: null  # 存在すれば評価有効化
tokenizer_path: "data/tokenizer.json"

# 学習制御（hparamsで上書きされる値のデフォルト・フォールバック）
training:
  seq_len: 1024
  max_steps: -1
  num_epochs: 1
  save_steps: 500
  eval_steps: 1000
  logging_steps: 10
  torch_compile: true
  use_liger_kernel: true
  dataloader_pin_memory: true
  dataloader_num_workers: 0
  allow_tf32: true
  torch_empty_cache_steps: 100
  dataloader_prefetch_factor: 2
  packing: true
  optim: "adamw_bnb_8bit"

# LRスケジューラ設定 (Step Law / Muon 推奨: Constant+Cosine)
lr_scheduler_type: "constant_cosine"  # constant_cosine / cosine / step_law
warmup_ratio: 0.03                    # Warmup比率 (Step Law推奨: 0.03 = 3%)
constant_ratio: 0.1                   # Constant LR維持比率 (Step Law推奨: 0.1 = 10%)
# warmup_steps: 0                     # 明示指定時は warmup_ratio より優先
# constant_steps: 0                   # 明示指定時は constant_ratio より優先
num_cycles: 0.5                       # Cosine減衰サイクル数 (0.5 = 半周期で0)

# ハードウェア最適化設定
torch_compile: false                  # 常時OFF: コンパイル時VRAMスパイク→CPUオフロード回避
use_liger_kernel: true                # Linux/WSL2でON: Tritonランタイム最適化(VRAM削減+高速化)。Windowsはconfig.pyで強制OFF

# トークナイズ並列化設定 (Windows ThreadPool / Linux multiprocessing)
tokenization:
  windows_max_workers: null    # null=自動検出、数値で固定
  windows_batch_size: 1000     # Windows ThreadPool バッチサイズ
  fallback_single_thread: true # 失敗時フォールバック有効

# モデルアーキテクチャ（スケール変更時のみ書き換え）
model:
  target_params: 150_000_000
  llama:
    hidden_size: 768
    num_hidden_layers: 12
    num_attention_heads: 12
    num_key_value_heads: 3
    intermediate_size: 3072
    rope_theta: 500000.0
    vocab_size: 64000
    attn_implementation: "sdpa"  # sdpa: PyTorch標準 (Windows/Linux互換)、flash_attention_2: Linux専用
