# Novel LLM - Base Config
# これは全ての実験の起点。scaling_*.yaml がこの設定を継承して差分を上書きする。
# VRAM検出、precision、checkpoint、logging はコードが自動的に処理する。

seed: 42

model:
  arch: "llama"
  target_params: 150_000_000
  llama:
    hidden_size: 768
    num_hidden_layers: 12
    num_attention_heads: 12
    num_key_value_heads: 3
    intermediate_size: 3072
    rope_theta: 10000.0

data:
  dataset_path: "data/dataset.jsonl"
  tokenizer_path: "data/tokenizer.json"

training:
  seq_len: 1024
  max_steps: -1
  num_epochs: 3
