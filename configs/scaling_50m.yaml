# ============================================================
# 50M スケーリング設定
# ============================================================
# 対象GPU: RTX 3050 (4GB VRAM)
# 用途:    初期開発・デバッグ用。最小モデルで設計を検証。
# 目安:    BF16 + ZeRO-1 で約0.5GB使用
#
# Chinchilla則の限界:
#   N=50M, L=10, H=640 → 12 × 10 × 640^2 ≈ 49M
#   パラメータの多くが埋め込み层に吸い込まれるため、
#   実質的な表現力は限定的。あくまで動作確認用。
#
# 参照: scaling_laws.py で損失を自動計算

defaults:
  - config  # config.yaml を継承

model:
  # ターゲットパラメータ数
  target_params: 50_000_000

  llama:
    # 50M向けにレイヤー数・次元数を縮小
    # 10層 × 640次元 ≈ 49M (FFN, 埋め込み含めると50M)
    hidden_size: 640
    num_hidden_layers: 10
    num_attention_heads: 10  # 640 / 10 = 64次元/ヘッド
    # GQA省略 (ヘッド数が少ないため) → MHAとして動作
    num_key_value_heads: 10
    # 2560 = 640 × 4 (FFN倍率4)
    intermediate_size: 2560

    # 2048ctx相当。RoPEのthetaを大きくして長コンテキストに対応。
    # ただし50Mモデルで2048ctxは過大なため、実質的には学習不到着。
    rope_theta: 50000.0

training:
  # 2048ctx: 長めのシーケンスでメモリ効率を確認
  seq_len: 2048

  # 1500ステップ固定: 短時間で学習完了を確認
  # VRAMが小さいため、早期に収束を確認する目的
  max_steps: 1500

  # 1エポック: 早期停止のベースライン確認用
  num_epochs: 1
