# ============================================================
# 7B スケーリング設定
# ============================================================
# 対象GPU: RTX 5090 x2 (48GB VRAM, 2カード)
# 用途:    大規模モデル。最高品質の生成を目指す。
# 目安:    BF16 + ZeRO-2 で約14GB使用 (2カード分散)
#
# Chinchilla則の計算:
#   N=7B, L=32, H=4096 → 12 × 32 × 4096^2 ≈ 6.4B
#   FFN(11008)と埋め込み(64k×4096)を含めると約7B
#
# スケーリングの注目点:
#   - 3B → 7B は2.3倍のパラメータ増加
#   - hidden_size: 2560 → 4096 (1.6倍)
#   - num_layers: 28 → 32 (1.1倍)
#   - seq_len: 2048 → 4096 (2倍)
#   - 2カード分散が必要 (ZeRO-2)
#
# 参照: scaling_laws.py で損失を自動計算

defaults:
  - config  # config.yaml を継承

model:
  # ターゲットパラメータ数 (7B)
  target_params: 7_000_000_000

  llama:
    # 7B向けのレイヤー構成
    # 32層 × 4096次元 → Chinchilla則で約7B
    hidden_size: 4096
    num_hidden_layers: 32
    num_attention_heads: 32  # 4096 / 32 = 128次元/ヘッド
    # GQA省略: 7B規模ではMHAで十分な表現力
    num_key_value_heads: 32
    # 11008 = 4096 × 2.69 (SwiGLU推奨値は 8/3 ≈ 2.67)
    # LLaMA-7Bと同じ構成を採用
    intermediate_size: 11008

    # デフォルトのrope_theta=10000.0を継承 (1024ctx相当)
    # 7Bモデルでは4096ctxが推奨されるが、
    # 2カード分散でも4096ctxはメモリ的に厳しい。
    # まずは1024ctxで学習し、必要に応じて拡張。
    # rope_theta: 10000.0  # デフォルトを継承

training:
  # 4096ctx: 長期依存関係を学習
  # 7Bモデルでは4096ctxが妥当な範囲
  # ただしメモリ使用量が大きいため、2カード分散が必要
  seq_len: 4096

  # エポックベースで学習
  max_steps: -1
  num_epochs: 3
